services:
  postgres:
    image: 'postgres:17'          # pinned (NOT 'latest') so we get a Flyway-supported version
    environment:
      - 'POSTGRES_DB=cricketiq'    # our database name, not the generic 'mydatabase'
      - 'POSTGRES_USER=cricketiq'
      - 'POSTGRES_PASSWORD=cricketiq'
    ports:
      - '5433:5432'               # fixed host port so a DB GUI (DBeaver/pgAdmin) can connect
    volumes:
      - 'cricketiq-pgdata:/var/lib/postgresql/data'   # persist data across restarts
  redis:
    image: 'redis:7'              # pinned
    ports:
      - '6379:6379'

volumes:
  cricketiq-pgdata:               # named volume declared here
